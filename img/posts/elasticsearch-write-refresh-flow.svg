<svg viewBox="0 0 940 760" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, Noto Sans SC, PingFang SC, sans-serif">
  <style>
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
    .title { fill: #f8fafc; font-size: 16px; font-weight: 700; }
    .subtitle { fill: #94a3b8; font-size: 9px; }
    .label { fill: #f8fafc; font-size: 11px; font-weight: 600; }
    .small { fill: #94a3b8; font-size: 9px; }
    .tiny { fill: #cbd5e1; font-size: 8px; }
    .yes { fill: #34d399; font-size: 8px; font-weight: 600; }
    .no { fill: #fb7185; font-size: 8px; font-weight: 600; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="30" y="35" fill="#f8fafc" font-size="16" font-weight="700">写入、复制、Refresh、Flush 与 Merge</text>
  <text x="30" y="53" fill="#94a3b8" font-size="9">写入成功表示 primary 和 in-sync replicas 接受了操作；refresh 之后才对搜索可见；flush 和 merge 解决的是持久化边界与 segment 维护。</text>

  <rect x="370" y="85" width="200" height="54" rx="27" fill="#0f172a"/>
  <rect x="370" y="85" width="200" height="54" rx="27" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="470" y="116" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="middle">JSON document</text>

  <rect x="365" y="180" width="210" height="62" rx="6" fill="#0f172a"/>
  <rect x="365" y="180" width="210" height="62" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="470" y="204" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="middle">Mapping + Routing</text>
  <text x="470" y="221" fill="#94a3b8" font-size="9" text-anchor="middle">字段类型、analyzer、目标 primary</text>

  <rect x="365" y="285" width="210" height="62" rx="6" fill="#0f172a"/>
  <rect x="365" y="285" width="210" height="62" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="470" y="309" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="middle">Primary Shard 写入</text>
  <text x="470" y="326" fill="#94a3b8" font-size="9" text-anchor="middle">校验、版本、局部 Lucene 操作</text>

  <rect x="105" y="285" width="190" height="62" rx="6" fill="#0f172a"/>
  <rect x="105" y="285" width="190" height="62" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="200" y="309" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="middle">Translog</text>
  <text x="200" y="326" fill="#94a3b8" font-size="9" text-anchor="middle">故障恢复用预写日志</text>

  <rect x="645" y="285" width="190" height="62" rx="6" fill="#0f172a"/>
  <rect x="645" y="285" width="190" height="62" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="740" y="309" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="middle">Replica Shards</text>
  <text x="740" y="326" fill="#94a3b8" font-size="9" text-anchor="middle">并行复制到 in-sync replicas</text>

  <g transform="translate(470,420)">
    <polygon points="0,-46 70,0 0,46 -70,0" fill="#0f172a"/>
    <polygon points="0,-46 70,0 0,46 -70,0" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
    <text y="-4" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="middle">需要等待</text>
    <text y="12" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="middle">搜索可见?</text>
  </g>

  <rect x="625" y="393" width="200" height="58" rx="6" fill="#0f172a"/>
  <rect x="625" y="393" width="200" height="58" rx="6" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="725" y="416" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="middle">Response ACK</text>
  <text x="725" y="433" fill="#94a3b8" font-size="9" text-anchor="middle">写入成功，但可能还搜不到</text>

  <rect x="365" y="520" width="210" height="62" rx="6" fill="#0f172a"/>
  <rect x="365" y="520" width="210" height="62" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="470" y="544" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="middle">Refresh</text>
  <text x="470" y="561" fill="#94a3b8" font-size="9" text-anchor="middle">buffer 生成可搜索 segment</text>

  <rect x="105" y="520" width="190" height="62" rx="6" fill="#0f172a"/>
  <rect x="105" y="520" width="190" height="62" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <ellipse cx="200" cy="520" rx="95" ry="14" fill="#0f172a"/>
  <ellipse cx="200" cy="520" rx="95" ry="14" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <ellipse cx="200" cy="582" rx="95" ry="14" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="200" y="548" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="middle">Indexing Buffer</text>
  <text x="200" y="565" fill="#94a3b8" font-size="9" text-anchor="middle">内存中的待刷新数据</text>

  <rect x="365" y="650" width="210" height="58" rx="6" fill="#0f172a"/>
  <rect x="365" y="650" width="210" height="58" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="470" y="673" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="middle">Searchable Segment</text>
  <text x="470" y="690" fill="#94a3b8" font-size="9" text-anchor="middle">Searcher 打开后可被查询</text>

  <rect x="625" y="520" width="200" height="62" rx="6" fill="#0f172a"/>
  <rect x="625" y="520" width="200" height="62" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="725" y="544" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="middle">Flush</text>
  <text x="725" y="561" fill="#94a3b8" font-size="9" text-anchor="middle">Lucene commit + 截断 translog</text>

  <rect x="625" y="650" width="200" height="58" rx="6" fill="#0f172a"/>
  <rect x="625" y="650" width="200" height="58" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="725" y="673" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="middle">Merge</text>
  <text x="725" y="690" fill="#94a3b8" font-size="9" text-anchor="middle">合并 segment、清理删除标记</text>

  <path d="M 470 139 L 470 172" fill="none" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <path d="M 470 242 L 470 277" fill="none" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <path d="M 365 316 L 303 316" fill="none" stroke="#fb7185" stroke-width="1.3" marker-end="url(#arrow-rose)"/>
  <path d="M 575 316 L 637 316" fill="none" stroke="#64748b" stroke-width="1.3" marker-end="url(#arrow)"/>
  <path d="M 470 347 L 470 366" fill="none" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <path d="M 540 420 L 617 420" fill="none" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="578" y="411" fill="#fb7185" font-size="8" font-weight="600" text-anchor="middle">否</text>
  <path d="M 470 466 L 470 512" fill="none" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="486" y="492" fill="#34d399" font-size="8" font-weight="600">是 / refresh 发生</text>
  <path d="M 295 551 L 357 551" fill="none" stroke="#22d3ee" stroke-width="1.3" marker-end="url(#arrow)"/>
  <path d="M 470 582 L 470 642" fill="none" stroke="#22d3ee" stroke-width="1.3" marker-end="url(#arrow)"/>
  <path d="M 575 551 L 617 551" fill="none" stroke="#64748b" stroke-width="1.1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <path d="M 575 679 L 617 679" fill="none" stroke="#64748b" stroke-width="1.1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <path d="M 725 582 L 725 642" fill="none" stroke="#64748b" stroke-width="1.1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>

  <text x="331" y="305" fill="#cbd5e1" font-size="8" text-anchor="middle">append</text>
  <text x="608" y="305" fill="#cbd5e1" font-size="8" text-anchor="middle">copy op</text>
  <text x="602" y="540" fill="#cbd5e1" font-size="8" text-anchor="middle">周期性</text>
  <text x="602" y="669" fill="#cbd5e1" font-size="8" text-anchor="middle">后台</text>

  <g transform="translate(35,675)">
    <rect x="0" y="0" width="285" height="46" rx="6" fill="rgba(30,41,59,0.65)" stroke="#475569" stroke-width="1"/>
    <text x="14" y="19" fill="#cbd5e1" font-size="8">refresh: 让数据可搜索</text>
    <text x="14" y="34" fill="#cbd5e1" font-size="8">flush: 提交并控制 translog 大小；merge: 维护 segment</text>
  </g>
</svg>
