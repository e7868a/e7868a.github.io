<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, Noto Sans SC, PingFang SC, sans-serif">
  <style>
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="30" y="36" fill="#f8fafc" font-size="16" font-weight="700">RabbitMQ Quorum Queue 部署模型</text>
  <text x="30" y="56" fill="#94a3b8" font-size="9">Quorum queue 使用复制日志：leader 接受写入并复制到 follower；多数派确认后再向生产者确认。</text>

  <rect x="236" y="92" width="710" height="376" rx="12" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="252" y="112" fill="#fbbf24" font-size="9" font-weight="600">RabbitMQ Cluster / 三个故障域</text>

  <rect x="52" y="164" width="134" height="62" rx="6" fill="#0f172a"/>
  <rect x="52" y="164" width="134" height="62" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="119" y="189" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">Producer</text>
  <text x="119" y="207" fill="#94a3b8" font-size="8" text-anchor="middle">publish + confirm</text>

  <rect x="52" y="326" width="134" height="62" rx="6" fill="#0f172a"/>
  <rect x="52" y="326" width="134" height="62" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="119" y="351" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">Consumer</text>
  <text x="119" y="369" fill="#94a3b8" font-size="8" text-anchor="middle">consume + ack</text>

  <rect x="282" y="150" width="176" height="230" rx="10" fill="rgba(30,41,59,0.5)" stroke="#64748b" stroke-width="1"/>
  <text x="370" y="175" fill="#e2e8f0" font-size="11" font-weight="700" text-anchor="middle">Node A</text>
  <text x="370" y="194" fill="#94a3b8" font-size="8" text-anchor="middle">queue leader</text>
  <rect x="306" y="226" width="128" height="74" rx="6" fill="#0f172a"/>
  <rect x="306" y="226" width="128" height="74" rx="6" fill="rgba(251,146,60,0.28)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="370" y="253" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">Leader</text>
  <text x="370" y="271" fill="#fbbf24" font-size="8" text-anchor="middle">quorum queue</text>
  <text x="370" y="287" fill="#94a3b8" font-size="8" text-anchor="middle">append log</text>

  <rect x="534" y="150" width="176" height="230" rx="10" fill="rgba(30,41,59,0.5)" stroke="#64748b" stroke-width="1"/>
  <text x="622" y="175" fill="#e2e8f0" font-size="11" font-weight="700" text-anchor="middle">Node B</text>
  <text x="622" y="194" fill="#94a3b8" font-size="8" text-anchor="middle">replica follower</text>
  <rect x="558" y="226" width="128" height="74" rx="6" fill="#0f172a"/>
  <rect x="558" y="226" width="128" height="74" rx="6" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="622" y="253" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">Follower</text>
  <text x="622" y="271" fill="#c4b5fd" font-size="8" text-anchor="middle">replicated log</text>
  <text x="622" y="287" fill="#94a3b8" font-size="8" text-anchor="middle">ack to leader</text>

  <rect x="786" y="150" width="124" height="230" rx="10" fill="rgba(30,41,59,0.5)" stroke="#64748b" stroke-width="1"/>
  <text x="848" y="175" fill="#e2e8f0" font-size="11" font-weight="700" text-anchor="middle">Node C</text>
  <text x="848" y="194" fill="#94a3b8" font-size="8" text-anchor="middle">replica</text>
  <rect x="806" y="226" width="84" height="74" rx="6" fill="#0f172a"/>
  <rect x="806" y="226" width="84" height="74" rx="6" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="848" y="253" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">Follower</text>
  <text x="848" y="271" fill="#c4b5fd" font-size="8" text-anchor="middle">log copy</text>
  <text x="848" y="287" fill="#94a3b8" font-size="8" text-anchor="middle">voter</text>

  <path d="M 186 195 L 306 253" fill="none" stroke="#22d3ee" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="238" y="210" fill="#cbd5e1" font-size="8" text-anchor="middle">写入 leader</text>
  <path d="M 434 253 L 558 253" fill="none" stroke="#fb923c" stroke-width="1.7" marker-end="url(#arrow-orange)"/>
  <text x="496" y="240" fill="#fbbf24" font-size="8" text-anchor="middle">复制</text>
  <path d="M 434 274 L 806 274" fill="none" stroke="#fb923c" stroke-width="1.7" marker-end="url(#arrow-orange)"/>
  <text x="620" y="304" fill="#fbbf24" font-size="8" text-anchor="middle">多数派确认：2 / 3</text>
  <path d="M 306 286 L 186 357" fill="none" stroke="#34d399" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="236" y="345" fill="#cbd5e1" font-size="8" text-anchor="middle">投递给 consumer</text>
  <path d="M 306 236 L 186 181" fill="none" stroke="#64748b" stroke-width="1.2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="234" y="174" fill="#94a3b8" font-size="8" text-anchor="middle">confirm</text>

  <rect x="282" y="414" width="628" height="34" rx="7" fill="rgba(30,41,59,0.65)" stroke="#64748b" stroke-width="1"/>
  <text x="596" y="435" fill="#e2e8f0" font-size="8" text-anchor="middle">3 副本可容忍 1 个副本不可用；5 副本可容忍 2 个。副本提升可用性，但会增加网络和磁盘复制成本。</text>
</svg>
