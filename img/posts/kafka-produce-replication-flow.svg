<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 780">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
      .title { fill: #f8fafc; font-size: 18px; font-weight: 700; }
      .subtitle { fill: #94a3b8; font-size: 10px; }
      .lane { fill: none; stroke: #334155; stroke-width: 1; stroke-dasharray: 8 4; }
      .lane-title { fill: #cbd5e1; font-size: 10px; font-weight: 600; }
      .box { fill: rgba(8,51,68,0.45); stroke: #22d3ee; stroke-width: 1.5; }
      .leader { fill: rgba(6,78,59,0.45); stroke: #34d399; stroke-width: 1.5; }
      .follower { fill: rgba(76,29,149,0.42); stroke: #a78bfa; stroke-width: 1.5; }
      .decision { fill: rgba(120,53,15,0.34); stroke: #fbbf24; stroke-width: 1.5; }
      .warn { fill: rgba(136,19,55,0.42); stroke: #fb7185; stroke-width: 1.5; }
      .ok { fill: rgba(59,130,246,0.35); stroke: #60a5fa; stroke-width: 1.5; }
      .label { fill: #f8fafc; font-size: 12px; font-weight: 600; }
      .small { fill: #94a3b8; font-size: 9px; }
      .tiny { fill: #cbd5e1; font-size: 8px; }
      .line { fill: none; stroke: #64748b; stroke-width: 1.5; marker-end: url(#arrow); }
      .green { fill: none; stroke: #34d399; stroke-width: 1.7; marker-end: url(#arrow-green); }
      .red { fill: none; stroke: #fb7185; stroke-width: 1.5; stroke-dasharray: 5 4; marker-end: url(#arrow-red); }
    </style>
  </defs>

  <rect width="1080" height="780" fill="#0f172a"/>
  <rect width="1080" height="780" fill="url(#grid)"/>

  <text x="34" y="38" class="title">Kafka 写入与副本复制流程</text>
  <text x="34" y="58" class="subtitle">Producer 写 leader；leader 追加日志；follower 复制；acks 与 min.insync.replicas 决定何时返回。</text>

  <rect x="70" y="92" width="240" height="590" rx="12" class="lane"/>
  <text x="88" y="114" class="lane-title">Producer</text>
  <rect x="370" y="92" width="280" height="590" rx="12" class="lane"/>
  <text x="388" y="114" class="lane-title">Partition Leader</text>
  <rect x="710" y="92" width="280" height="590" rx="12" class="lane"/>
  <text x="728" y="114" class="lane-title">Follower Replicas / ISR</text>

  <rect x="112" y="138" width="158" height="62" rx="7" fill="#0f172a"/>
  <rect x="112" y="138" width="158" height="62" rx="7" class="box"/>
  <text x="191" y="164" text-anchor="middle" class="label">选择 partition</text>
  <text x="191" y="182" text-anchor="middle" class="small">key / partitioner</text>

  <rect x="112" y="248" width="158" height="62" rx="7" fill="#0f172a"/>
  <rect x="112" y="248" width="158" height="62" rx="7" class="box"/>
  <text x="191" y="274" text-anchor="middle" class="label">攒 batch</text>
  <text x="191" y="292" text-anchor="middle" class="small">linger / compression</text>

  <rect x="416" y="248" width="188" height="62" rx="7" fill="#0f172a"/>
  <rect x="416" y="248" width="188" height="62" rx="7" class="leader"/>
  <text x="510" y="274" text-anchor="middle" class="label">追加到 leader log</text>
  <text x="510" y="292" text-anchor="middle" class="small">sequential append</text>

  <rect x="416" y="374" width="188" height="76" rx="7" fill="#0f172a"/>
  <rect x="416" y="374" width="188" height="76" rx="7" class="leader"/>
  <text x="510" y="403" text-anchor="middle" class="label">更新 LEO / HW</text>
  <text x="510" y="421" text-anchor="middle" class="small">leader end offset</text>
  <text x="510" y="437" text-anchor="middle" class="small">high watermark</text>

  <rect x="756" y="248" width="188" height="62" rx="7" fill="#0f172a"/>
  <rect x="756" y="248" width="188" height="62" rx="7" class="follower"/>
  <text x="850" y="274" text-anchor="middle" class="label">Follower fetch</text>
  <text x="850" y="292" text-anchor="middle" class="small">从 leader 拉取复制</text>

  <rect x="756" y="374" width="188" height="76" rx="7" fill="#0f172a"/>
  <rect x="756" y="374" width="188" height="76" rx="7" class="follower"/>
  <text x="850" y="403" text-anchor="middle" class="label">保持在 ISR 中</text>
  <text x="850" y="421" text-anchor="middle" class="small">复制进度足够接近</text>
  <text x="850" y="437" text-anchor="middle" class="small">否则会被移出 ISR</text>

  <g transform="translate(510 546)">
    <polygon points="0,-48 82,0 0,48 -82,0" fill="#0f172a"/>
    <polygon points="0,-48 82,0 0,48 -82,0" class="decision"/>
    <text y="-8" text-anchor="middle" class="label">acks 满足?</text>
    <text y="11" text-anchor="middle" class="small">0 / 1 / all</text>
  </g>

  <rect x="736" y="516" width="214" height="62" rx="7" fill="#0f172a"/>
  <rect x="736" y="516" width="214" height="62" rx="7" class="warn"/>
  <text x="843" y="542" text-anchor="middle" class="label">ISR 不足或超时</text>
  <text x="843" y="560" text-anchor="middle" class="small">返回错误，producer 重试</text>

  <rect x="112" y="624" width="188" height="62" rx="28" fill="#0f172a"/>
  <rect x="112" y="624" width="188" height="62" rx="28" class="ok"/>
  <text x="206" y="650" text-anchor="middle" class="label">写入成功返回</text>
  <text x="206" y="668" text-anchor="middle" class="small">record metadata</text>

  <path d="M 191 200 L 191 248" class="line"/>
  <path d="M 270 279 L 416 279" class="green"/>
  <path d="M 604 279 L 756 279" class="green"/>
  <path d="M 850 310 L 850 374" class="line"/>
  <path d="M 756 412 L 604 412" class="green"/>
  <path d="M 510 310 L 510 374" class="line"/>
  <path d="M 510 450 L 510 498" class="line"/>
  <path d="M 592 546 L 736 546" class="red"/>
  <path d="M 428 546 L 206 546 L 206 624" class="green"/>
  <path d="M 843 578 C 760 710, 310 724, 206 686" class="red"/>

  <text x="320" y="267" class="tiny" fill="#34d399">ProduceRequest</text>
  <text x="660" y="267" class="tiny" fill="#34d399">replicate</text>
  <text x="626" y="400" class="tiny" fill="#34d399">ack fetch</text>
  <text x="610" y="536" class="tiny" fill="#fb7185">否</text>
  <text x="350" y="536" class="tiny" fill="#34d399">是</text>

  <rect x="82" y="704" width="910" height="42" rx="7" fill="#0f172a"/>
  <rect x="82" y="704" width="910" height="42" rx="7" fill="rgba(30,41,59,0.55)" stroke="#94a3b8" stroke-width="1"/>
  <text x="537" y="730" text-anchor="middle" class="small">可靠性组合通常同时看 replication.factor、acks=all、min.insync.replicas、producer retry 与幂等配置。</text>
</svg>
