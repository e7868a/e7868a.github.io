<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
      .title { fill: #f8fafc; font-size: 18px; font-weight: 700; }
      .subtitle { fill: #94a3b8; font-size: 10px; }
      .label { fill: #f8fafc; font-size: 12px; font-weight: 600; }
      .small { fill: #94a3b8; font-size: 9px; }
      .tiny { fill: #cbd5e1; font-size: 8px; }
      .region { fill: none; stroke: #fbbf24; stroke-width: 1.2; stroke-dasharray: 9 5; }
      .producer { fill: rgba(8,51,68,0.42); stroke: #22d3ee; stroke-width: 1.5; }
      .broker { fill: rgba(6,78,59,0.42); stroke: #34d399; stroke-width: 1.5; }
      .partition { fill: rgba(76,29,149,0.42); stroke: #a78bfa; stroke-width: 1.2; }
      .offset { fill: rgba(30,41,59,0.58); stroke: #94a3b8; stroke-width: 1.2; }
      .consumer { fill: rgba(59,130,246,0.35); stroke: #60a5fa; stroke-width: 1.5; }
      .line { fill: none; stroke: #64748b; stroke-width: 1.4; marker-end: url(#arrow); }
      .write { fill: none; stroke: #22d3ee; stroke-width: 1.8; marker-end: url(#arrow-cyan); }
      .read { fill: none; stroke: #34d399; stroke-width: 1.8; marker-end: url(#arrow-emerald); }
    </style>
  </defs>

  <rect width="1200" height="640" fill="#0f172a"/>
  <rect width="1200" height="640" fill="url(#grid)"/>

  <text x="34" y="38" class="title">Kafka 集群、Topic 与 Consumer Group</text>
  <text x="34" y="58" class="subtitle">Topic 被拆成多个 partition；每个 partition 有 leader/follower 副本；不同 consumer group 各自维护 offset。</text>

  <rect x="300" y="86" width="560" height="430" rx="14" class="region"/>
  <text x="318" y="108" fill="#fbbf24" font-size="10" font-weight="600">Kafka Cluster</text>

  <path d="M 200 210 C 245 210, 250 158, 300 158" class="write"/>
  <path d="M 200 300 C 250 300, 250 290, 300 290" class="write"/>
  <path d="M 860 170 C 910 170, 910 210, 960 210" class="read"/>
  <path d="M 860 300 C 910 300, 910 300, 960 300" class="read"/>
  <path d="M 860 430 C 910 430, 910 392, 960 392" class="read"/>
  <path d="M 1032 430 C 970 514, 770 560, 610 542" class="line"/>

  <rect x="50" y="162" width="150" height="72" rx="7" fill="#0f172a"/>
  <rect x="50" y="162" width="150" height="72" rx="7" class="producer"/>
  <text x="125" y="190" text-anchor="middle" class="label">Producer A</text>
  <text x="125" y="209" text-anchor="middle" class="small">key=order_id</text>

  <rect x="50" y="272" width="150" height="72" rx="7" fill="#0f172a"/>
  <rect x="50" y="272" width="150" height="72" rx="7" class="producer"/>
  <text x="125" y="300" text-anchor="middle" class="label">Producer B</text>
  <text x="125" y="319" text-anchor="middle" class="small">batch + compression</text>

  <g transform="translate(330 132)">
    <rect x="0" y="0" width="160" height="330" rx="9" fill="#0f172a"/>
    <rect x="0" y="0" width="160" height="330" rx="9" class="broker"/>
    <text x="80" y="25" text-anchor="middle" class="label">Broker 1</text>
    <text x="80" y="44" text-anchor="middle" class="small">leader + replicas</text>
    <rect x="20" y="72" width="120" height="48" rx="6" class="partition"/>
    <text x="80" y="94" text-anchor="middle" class="tiny">orders-0 leader</text>
    <text x="80" y="110" text-anchor="middle" class="tiny">offset 0..n</text>
    <rect x="20" y="142" width="120" height="48" rx="6" class="partition"/>
    <text x="80" y="164" text-anchor="middle" class="tiny">orders-1 follower</text>
    <text x="80" y="180" text-anchor="middle" class="tiny">replica</text>
    <rect x="20" y="212" width="120" height="48" rx="6" class="partition"/>
    <text x="80" y="234" text-anchor="middle" class="tiny">orders-2 follower</text>
    <text x="80" y="250" text-anchor="middle" class="tiny">replica</text>
  </g>

  <g transform="translate(520 132)">
    <rect x="0" y="0" width="160" height="330" rx="9" fill="#0f172a"/>
    <rect x="0" y="0" width="160" height="330" rx="9" class="broker"/>
    <text x="80" y="25" text-anchor="middle" class="label">Broker 2</text>
    <text x="80" y="44" text-anchor="middle" class="small">leader + replicas</text>
    <rect x="20" y="72" width="120" height="48" rx="6" class="partition"/>
    <text x="80" y="94" text-anchor="middle" class="tiny">orders-0 follower</text>
    <text x="80" y="110" text-anchor="middle" class="tiny">replica</text>
    <rect x="20" y="142" width="120" height="48" rx="6" class="partition"/>
    <text x="80" y="164" text-anchor="middle" class="tiny">orders-1 leader</text>
    <text x="80" y="180" text-anchor="middle" class="tiny">offset 0..n</text>
    <rect x="20" y="212" width="120" height="48" rx="6" class="partition"/>
    <text x="80" y="234" text-anchor="middle" class="tiny">orders-2 follower</text>
    <text x="80" y="250" text-anchor="middle" class="tiny">replica</text>
  </g>

  <g transform="translate(710 132)">
    <rect x="0" y="0" width="120" height="330" rx="9" fill="#0f172a"/>
    <rect x="0" y="0" width="120" height="330" rx="9" class="broker"/>
    <text x="60" y="25" text-anchor="middle" class="label">Broker 3</text>
    <text x="60" y="44" text-anchor="middle" class="small">replicas</text>
    <rect x="15" y="72" width="90" height="48" rx="6" class="partition"/>
    <text x="60" y="94" text-anchor="middle" class="tiny">orders-0</text>
    <text x="60" y="110" text-anchor="middle" class="tiny">follower</text>
    <rect x="15" y="142" width="90" height="48" rx="6" class="partition"/>
    <text x="60" y="164" text-anchor="middle" class="tiny">orders-1</text>
    <text x="60" y="180" text-anchor="middle" class="tiny">follower</text>
    <rect x="15" y="212" width="90" height="48" rx="6" class="partition"/>
    <text x="60" y="234" text-anchor="middle" class="tiny">orders-2</text>
    <text x="60" y="250" text-anchor="middle" class="tiny">leader</text>
  </g>

  <rect x="390" y="535" width="230" height="64" rx="7" fill="#0f172a"/>
  <rect x="390" y="535" width="230" height="64" rx="7" class="offset"/>
  <text x="505" y="562" text-anchor="middle" class="label">__consumer_offsets</text>
  <text x="505" y="581" text-anchor="middle" class="small">group/topic/partition -&gt; committed offset</text>

  <rect x="960" y="162" width="180" height="82" rx="8" fill="#0f172a"/>
  <rect x="960" y="162" width="180" height="82" rx="8" class="consumer"/>
  <text x="1050" y="190" text-anchor="middle" class="label">Consumer Group A</text>
  <text x="1050" y="210" text-anchor="middle" class="small">3 consumers 并行处理</text>
  <text x="1050" y="226" text-anchor="middle" class="tiny">每个 partition 分给一个成员</text>

  <rect x="960" y="276" width="180" height="82" rx="8" fill="#0f172a"/>
  <rect x="960" y="276" width="180" height="82" rx="8" class="consumer"/>
  <text x="1050" y="304" text-anchor="middle" class="label">Consumer Group B</text>
  <text x="1050" y="324" text-anchor="middle" class="small">独立订阅同一 topic</text>
  <text x="1050" y="340" text-anchor="middle" class="tiny">自己的 offset 进度</text>

  <rect x="960" y="390" width="180" height="82" rx="8" fill="#0f172a"/>
  <rect x="960" y="390" width="180" height="82" rx="8" class="consumer"/>
  <text x="1050" y="418" text-anchor="middle" class="label">Stream Job</text>
  <text x="1050" y="438" text-anchor="middle" class="small">Flink / Kafka Streams</text>
  <text x="1050" y="454" text-anchor="middle" class="tiny">可从历史 offset 回放</text>

  <text x="258" y="150" class="tiny" fill="#22d3ee">write by key</text>
  <text x="886" y="146" class="tiny" fill="#34d399">poll partitions</text>
  <text x="870" y="552" class="tiny">提交 offset 不会删除消息；retention/compact 决定数据保留</text>
</svg>
