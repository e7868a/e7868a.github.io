<svg viewBox="0 0 1040 620" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, Noto Sans SC, PingFang SC, sans-serif">
  <style>
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-open" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polyline points="0 0, 10 3.5, 0 7" fill="none" stroke="#64748b" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="30" y="36" fill="#f8fafc" font-size="16" font-weight="700">RabbitMQ 发布、路由、消费与确认流程</text>
  <text x="30" y="56" fill="#94a3b8" font-size="9">可靠性不是一个开关，而是 publish confirm、持久化/复制、consumer ack、重试和死信共同组成的链路。</text>

  <g>
    <rect x="42" y="88" width="132" height="48" rx="6" fill="#0f172a"/>
    <rect x="42" y="88" width="132" height="48" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="108" y="117" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">Producer</text>
    <line x1="108" y1="136" x2="108" y2="560" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

    <rect x="242" y="88" width="132" height="48" rx="6" fill="#0f172a"/>
    <rect x="242" y="88" width="132" height="48" rx="6" fill="rgba(251,146,60,0.25)" stroke="#fb923c" stroke-width="1.5"/>
    <text x="308" y="117" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">Broker</text>
    <line x1="308" y1="136" x2="308" y2="560" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

    <rect x="442" y="88" width="132" height="48" rx="6" fill="#0f172a"/>
    <rect x="442" y="88" width="132" height="48" rx="6" fill="rgba(251,146,60,0.25)" stroke="#fb923c" stroke-width="1.5"/>
    <text x="508" y="117" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">Exchange</text>
    <line x1="508" y1="136" x2="508" y2="560" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

    <rect x="642" y="88" width="132" height="48" rx="6" fill="#0f172a"/>
    <rect x="642" y="88" width="132" height="48" rx="6" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="708" y="117" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">Queue</text>
    <line x1="708" y1="136" x2="708" y2="560" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

    <rect x="842" y="88" width="132" height="48" rx="6" fill="#0f172a"/>
    <rect x="842" y="88" width="132" height="48" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
    <text x="908" y="117" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">Consumer</text>
    <line x1="908" y1="136" x2="908" y2="560" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>
  </g>

  <circle cx="90" cy="170" r="8" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1"/>
  <text x="90" y="173" fill="#60a5fa" font-size="7" font-weight="600" text-anchor="middle">1</text>
  <line x1="108" y1="170" x2="308" y2="170" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="208" y="158" fill="#e2e8f0" font-size="9" text-anchor="middle">basic.publish(exchange, routing_key)</text>

  <circle cx="290" cy="220" r="8" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1"/>
  <text x="290" y="223" fill="#60a5fa" font-size="7" font-weight="600" text-anchor="middle">2</text>
  <line x1="308" y1="220" x2="508" y2="220" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="408" y="208" fill="#e2e8f0" font-size="9" text-anchor="middle">交给 exchange 路由</text>

  <circle cx="490" cy="270" r="8" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1"/>
  <text x="490" y="273" fill="#60a5fa" font-size="7" font-weight="600" text-anchor="middle">3</text>
  <line x1="508" y1="270" x2="708" y2="270" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="608" y="258" fill="#e2e8f0" font-size="9" text-anchor="middle">binding 匹配后入队</text>

  <circle cx="690" cy="320" r="8" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1"/>
  <text x="690" y="323" fill="#60a5fa" font-size="7" font-weight="600" text-anchor="middle">4</text>
  <path d="M 708 320 L 748 320 L 748 346 L 708 346" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="754" y="337" fill="#e2e8f0" font-size="8">持久化 / 复制</text>

  <circle cx="290" cy="380" r="8" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1"/>
  <text x="290" y="383" fill="#60a5fa" font-size="7" font-weight="600" text-anchor="middle">5</text>
  <line x1="308" y1="380" x2="108" y2="380" stroke="#64748b" stroke-width="1.2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="208" y="368" fill="#94a3b8" font-size="9" font-style="italic" text-anchor="middle">publisher confirm</text>

  <circle cx="690" cy="430" r="8" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1"/>
  <text x="690" y="433" fill="#60a5fa" font-size="7" font-weight="600" text-anchor="middle">6</text>
  <line x1="708" y1="430" x2="908" y2="430" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-open)"/>
  <text x="808" y="418" fill="#e2e8f0" font-size="9" text-anchor="middle">deliver，受 prefetch 限制</text>

  <circle cx="890" cy="480" r="8" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1"/>
  <text x="890" y="483" fill="#60a5fa" font-size="7" font-weight="600" text-anchor="middle">7</text>
  <path d="M 908 480 L 952 480 L 952 506 L 908 506" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="958" y="497" fill="#e2e8f0" font-size="8">业务处理 + 幂等</text>

  <circle cx="890" cy="538" r="8" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1"/>
  <text x="890" y="541" fill="#60a5fa" font-size="7" font-weight="600" text-anchor="middle">8</text>
  <line x1="908" y1="538" x2="708" y2="538" stroke="#64748b" stroke-width="1.2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="808" y="526" fill="#94a3b8" font-size="9" font-style="italic" text-anchor="middle">ack / nack / reject</text>

  <rect x="42" y="574" width="932" height="28" rx="6" fill="rgba(136,19,55,0.25)" stroke="#fb7185" stroke-width="1"/>
  <text x="508" y="592" fill="#fecdd3" font-size="8" text-anchor="middle">失败路径：nack(requeue=true) 重新入队；nack(requeue=false) 可进入 DLX；consumer 断连且未 ack 的消息会被重新投递。</text>
</svg>
